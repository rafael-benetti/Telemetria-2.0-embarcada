name: backend-telemetry

services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "1884:1883"
    volumes:
      - ./broker-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  app:
    build:
      context: ./app
    restart: unless-stopped
    depends_on:
      - mqtt
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      TELEMETRY_TOPIC: dc/telemetry
      PORT: 8080
      TZ: America/Sao_Paulo
      FIRMWARE_FILE: firmware.bin
    ports:
      - "8080:8080"
    volumes:
      - firmware-data:/app/uploads

volumes:
  mosquitto-data:
  mosquitto-log:
  firmware-data:
