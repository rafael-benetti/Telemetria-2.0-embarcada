services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: dc-monitor-mqtt
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  app:
    build:
      context: ./app
    container_name: dc-monitor-app
    restart: unless-stopped
    depends_on:
      - mqtt
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      TELEMETRY_TOPIC: dc/telemetry
      PORT: 8080
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"

volumes:
  mosquitto-data:
  mosquitto-log:
