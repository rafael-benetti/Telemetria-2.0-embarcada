<html>
	<head>
		
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		
		<title>Black Telemetry</title>
		
		<link href="./bootstrap.min.css" rel="stylesheet">
		<link href="./customs.css" rel="stylesheet">
		
	</head>
    <body class="text-center" style="overflow: hidden">
		
		<form class="form-signin config" style="margin-top: -100px;">
			<img class="mb-4" src="./black.png" alt="" width="300">
			<i class="fa fa-cloud"></i>
			<div style="display: block; margin-bottom: 50px;"></div>
			
			<select id="type" name="type" class="form-control">
			  <option value="1">WiFi</option>
			  <option value="0">GSM</option>
			</select>
			<br>
			
			<div class="wifi" style="display: none;">				
				<input type="text" name="login_wifi" class="form-control" maxlength="32" placeholder="SSID" autofocus>
				<br>
				
				<input type="text" name="pass_wifi" class="form-control" maxlength="64" placeholder="SENHA">
				<br>
			</div>
			
			<div class="gsm" style="display: none;">
				<input type="text" name="apn" class="form-control" maxlength="64" placeholder="APN" autofocus>
				<br>				

				<input type="text" name="login_apn" class="form-control" maxlength="64" placeholder="LOGIN">
				<br>
				
				<input type="text" name="pass_apn" class="form-control" maxlength="64" placeholder="SENHA">
				<br>
				
				<input type="text" name="pin_apn" class="form-control" maxlength="8" placeholder="PIN">
				<br>
			</div>
			
			<button class="btn btn-lg btn-primary btn-block" type="submit">Salvar</button>
		</form>
		
		<div style="position: absolute; bottom: 4; left: 4; font-size: .9em; text-align: left;">
			<p style="margin: 0"><span style="font-weight: bold;">Dispositivo:</span> <span class="deviceName">BLK-0</span></p>
			<p style="margin: 0"><span style="font-weight: bold;">Versão:</span> <span class="version">0.0.0</span></p>
		</div>
		
		<div class="preloader" style="position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 9999">
			<div style="position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #f5f5f5;"></div>
			<div class="loader"></div>
		</div>
		
		<div class="dialog" style="display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 9999">
			<div style="position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #000; opacity: 0.7;"></div>
			<div style="position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #FFF; border: 1px solid rgba(0,0,0,.2); border-radius: .3rem; max-width: 300px; width: 100%; margin: auto; height: 220px; padding: 20px;">
				<svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-check2-circle" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="font-size: 3em; color: #28a745;">
					<path fill-rule="evenodd" d="M15.354 2.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L8 9.293l6.646-6.647a.5.5 0 0 1 .708 0z"/>
					<path fill-rule="evenodd" d="M8 2.5A5.5 5.5 0 1 0 13.5 8a.5.5 0 0 1 1 0 6.5 6.5 0 1 1-3.25-5.63.5.5 0 1 1-.5.865A5.472 5.472 0 0 0 8 2.5z"/>
				</svg>
				<h4 style="font-weight: bold; margin-bottom: 20px; line-height: 1.5">As configurações foram salvas com sucesso!</h4>
				<p style="font-size: 1.3em">A telemetria reiniciará em instantes.</p>
			</div>
		</div>
		
		<script src="./jquery.min.js"></script>
		
		<script>
			
			$('input').on('keydown', function() {
				var max = $(this).attr('maxlength'),
					val = $(this).val(),
					trimmed;

				if(max && val) {
					trimmed = val.substr(0, max);
					$(this).val(trimmed);
				}
			});

			function fillFields(obj) {
				
				$('form.config select#type').val(obj.type);
				
				if(obj.gsm) {
					$('form.config input[name="apn"]').val(obj.gsm.apn);
					$('form.config input[name="login_apn"]').val(obj.gsm.login);
					$('form.config input[name="pass_apn"]').val(obj.gsm.pass);
					$('form.config input[name="pin_apn"]').val(obj.gsm.pin);
				}
				
				if(obj.wifi) {
					$('form.config input[name="login_wifi"]').val(obj.wifi.login);
					$('form.config input[name="pass_wifi"]').val(obj.wifi.pass);
				}
				
				if($('select#type option:selected').val() == 1) {
					$('.wifi').css('display', 'block');
				} else {
					$('.gsm').css('display', 'block');
				}
								
				$('span.deviceName').html(obj.deviceName);
				$('span.version').html(obj.version);
				
			}
			
			
			if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
				
				jQuery.get('./getValues.txt', function(data) {
				   fillFields(JSON.parse(data));
				});
				
			} else {
			
				$.ajax({
					type: "GET",
					url: "./getValues",
					dataType: "json",        
					success: function(response, textStatus, xhr) {						
						fillFields(response);
					}
				});
				
			}
						
			$('select#type').on('change', function() {
			
				if($(this).val() == 1) {
					$('.wifi').css('display', 'block');
					$('.gsm').css('display', 'none');
				} else {
					$('.wifi').css('display', 'none');
					$('.gsm').css('display', 'block');
				}
			
			});
						
			$('form.config').on('submit', function(e) {
				e.preventDefault();
				
				var obj = new Object();
				
				var type = $('form.config select[name="type"]').val();
				
				if(type == 1) {
					obj.wifi = new Object();
					obj.wifi.login = $('form.config input[name="login_wifi"]').val();
					obj.wifi.pass = $('form.config input[name="pass_wifi"]').val();
				} else if(type == 0) {
					obj.gsm = new Object();
					obj.gsm.login = $('form.config input[name="login_apn"]').val();
					obj.gsm.pass = $('form.config input[name="pass_apn"]').val();
					obj.gsm.apn = $('form.config input[name="apn"]').val();
					obj.gsm.pin = $('form.config input[name="pin_apn"]').val();
				} else {
					return 0;
				}
												
				$.ajax({
					method: "POST",
					url: "./config",
					data: JSON.stringify(obj)
				}).done(function(msg, textStatus, xhr) {
					console.log(xhr.status);
					console.log(msg);
					$('.dialog').fadeIn(100);
				});
				
			});
			
			$(window).on("load", function(){
				$(".preloader").fadeOut(300);
			});
			
		</script>
    </body>
</html>
